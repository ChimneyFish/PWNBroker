{% extends "base.html" %}
{% block title %}Profile — PwnBroker{% endblock %}
{% block page_title %}My Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="form-card">
      <h5 class="fw-bold mb-4">Update Profile</h5>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" value="{{ current_user.username }}" disabled>
        </div>
        <div class="mb-4">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" value="{{ current_user.email }}">
        </div>
        <hr class="border-secondary">
        <h6 class="text-muted mt-3 mb-3">Change Password</h6>
        <div class="mb-3">
          <label class="form-label">Current Password</label>
          <input type="password" name="current_password" class="form-control">
        </div>
        <div class="mb-4">
          <label class="form-label">New Password</label>
          <input type="password" name="new_password" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
